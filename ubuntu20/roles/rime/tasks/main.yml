- name: install ibus-rime
  apt: 
    name: ibus-rime
    state: latest
    update_cache: yes
  become: yes

- name: create rime config path
  file: path=~/.config/ibus/rime/ state=directory recurse=yes
- name: copy rime config
  synchronize:
    src: .
    dest: ~/.config/ibus/rime/
    delete: yes