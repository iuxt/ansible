- name: change chinese repo
  template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
  become: yes

- name: install basic tools
  apt: 
    name: [ 'wget', 'screen', 'psmisc', 'curl']
    state: latest
    update_cache: yes
  become: yes

- name: ulimit change
  blockinfile:
    path: /etc/security/limits.conf
    marker: "# Ansible limit Change {mark}"
    block: |
      *               soft    nofile          65535
      *               hard    nofile          65535
      *               hard    nproc           65535
      *               soft    nproc           65535
  become: yes

